services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/etc_agent.db
      WS_PROXY: ${WS_PROXY:-}
      HTTP_PROXY: ${CONTAINER_HTTP_PROXY:-}
      HTTPS_PROXY: ${CONTAINER_HTTPS_PROXY:-}
      ALL_PROXY: ${CONTAINER_ALL_PROXY:-}
      NO_PROXY: ${CONTAINER_NO_PROXY:-localhost,127.0.0.1,backend}
      no_proxy: ${CONTAINER_NO_PROXY:-localhost,127.0.0.1,backend}
      # 代理配置：填入宿主机代理地址，容器内通过 host.docker.internal 访问宿主机
      # 示例（根据你的代理协议选择其中一行，取消注释）：
      # WS_PROXY=socks5://host.docker.internal:30051
      # WS_PROXY=http://host.docker.internal:30051
    volumes:
      - .:/app
      - backend_db:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_db:
  frontend_node_modules:
